apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-node-api
spec:
  replicas: 3 # Balanceamento de carga nativo do Kubernetes entre 3 réplicas!
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: api
          image: backend-endereco:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              value: "db-service"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: backend-endereco-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-endereco-secrets
                  key: db-password
            - name: DB_NAME
              value: "address_db"
            - name: DB_PORT
              value: "5432"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-endereco-secrets
                  key: jwt-secret
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: ClusterIP
  selector:
    app: backend-api
  ports:
    - protocol: TCP
      port: 80 # Porta exposta do serviço dentro do cluster
      targetPort: 3000 # Porta que a aplicação Node.js está ouvindo
