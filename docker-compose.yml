services:
  # Banco de Dados
  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # API Node.js (Configurada para suportar escalabilidade/load-balancing)
  api:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?schema=public
    depends_on:
      - db

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nginx-load-balancer
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

  # Prometheus para coleta de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-monitoring
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api

  # Grafana para visualização de métricas do Prometheus
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-visualizer
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - prometheus

  # Metabase para Business Intelligence dos dados de endereço
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-bi
    restart: always
    ports:
      - "3002:3000"
    depends_on:
      - db

volumes:
  pgdata:
